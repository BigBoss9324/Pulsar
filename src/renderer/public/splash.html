<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 300px;
      height: 380px;
      overflow: hidden;
      background: #0f0f14;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #c4c4d4;
      user-select: none;
      -webkit-app-region: drag;
    }

    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 220px 180px at 50% 45%, rgba(109,40,217,0.12) 0%, transparent 70%),
        linear-gradient(180deg, #13121e 0%, #0b0b11 100%);
    }

    .content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding-bottom: 32px;
      gap: 0;
    }

    .logo-wrap {
      width: 96px;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      position: relative;
    }

    .logo-glow {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(109,40,217,0.25) 0%, transparent 70%);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(0.95); }
      50%       { opacity: 1;   transform: scale(1.05); }
    }

    #logo {
      width: 88px;
      height: 88px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
    }

    #logo svg {
      width: 88px;
      height: 88px;
      filter: drop-shadow(0 0 18px rgba(109, 40, 217, 0.24));
    }

    #status {
      font-size: 12px;
      letter-spacing: 0.04em;
      color: #666680;
      margin-top: 4px;
      min-height: 18px;
      transition: opacity 0.2s;
    }

    .bar-track {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.04);
    }

    #bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6d28d9, #a78bfa);
      transition: width 0.25s ease;
      border-radius: 0 2px 2px 0;
    }

    .shimmer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(167,139,250,0.4) 50%,
        transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 1.8s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { background-position: -100% 0; }
      100% { background-position: 200% 0; }
    }

    .version {
      position: absolute;
      bottom: 10px;
      right: 12px;
      font-size: 10px;
      color: #333344;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="content">
    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <div id="logo" aria-label="Pulsar logo">
        <svg viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect x="1" y="11" width="3.5" height="6" rx="1.75" fill="#8b5cf6" opacity="0.5" />
          <rect x="6" y="7" width="3.5" height="14" rx="1.75" fill="#8b5cf6" opacity="0.7" />
          <rect x="11" y="2" width="3.5" height="24" rx="1.75" fill="#8b5cf6" />
          <rect x="16" y="7" width="3.5" height="14" rx="1.75" fill="#8b5cf6" opacity="0.7" />
          <rect x="21" y="11" width="3.5" height="6" rx="1.75" fill="#8b5cf6" opacity="0.5" />
        </svg>
      </div>
    </div>
    <div id="status">Starting...</div>
  </div>
  <div class="bar-track">
    <div id="bar"></div>
    <div class="shimmer" id="shimmer"></div>
  </div>
  <div class="version" id="version"></div>
</body>
</html>
